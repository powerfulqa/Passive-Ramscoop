name: Update NexusMods Download Stats

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: Fetch NexusMods download count
        id: scrape
        run: |
          import requests
          from bs4 import BeautifulSoup
          import json
          import os
          import time
          
          # Fetch the NexusMods mod page with realistic headers
          url = 'https://www.nexusmods.com/starsector/mods/147'
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8',
              'Accept-Language': 'en-US,en;q=0.9',
              'Accept-Encoding': 'gzip, deflate, br',
              'Referer': 'https://www.nexusmods.com/',
              'Connection': 'keep-alive',
              'Upgrade-Insecure-Requests': '1',
              'Sec-Fetch-Dest': 'document',
              'Sec-Fetch-Mode': 'navigate',
              'Sec-Fetch-Site': 'none',
              'Cache-Control': 'max-age=0'
          }
          
          download_count = None
          max_retries = 3
          retry_delay = 2
          
          for attempt in range(max_retries):
              try:
                  print(f"Attempt {attempt + 1}/{max_retries}...")
                  response = requests.get(url, headers=headers, timeout=15)
                  response.raise_for_status()
                  
                  soup = BeautifulSoup(response.content, 'html.parser')
                  
                  # Look for download count in various possible locations
                  # Common patterns on NexusMods mod pages
                  
                  # Try finding in main stats area
                  for element in soup.find_all(['div', 'span'], class_=lambda x: x and 'download' in x.lower()):
                      text = element.get_text()
                      if any(char.isdigit() for char in text):
                          import re
                          numbers = re.findall(r'[\d,]+', text)
                          if numbers:
                              download_count = numbers[-1].replace(',', '')
                              print(f"Found count: {download_count}")
                              break
                  
                  # Alternative: Look for specific data attributes or script tags
                  if not download_count:
                      for script in soup.find_all('script'):
                          if script.string and 'download' in script.string.lower():
                              import re
                              numbers = re.findall(r'[\d,]+', script.string)
                              if numbers:
                                  download_count = numbers[0].replace(',', '')
                                  print(f"Found count in script: {download_count}")
                                  break
                  
                  # If we got the count, break out of retry loop
                  if download_count:
                      break
                  else:
                      print("Count not found, may need to retry or site structure changed")
                      
              except requests.exceptions.HTTPError as e:
                  print(f"HTTP Error ({e.response.status_code}): {e}")
                  if e.response.status_code == 403:
                      print("Access forbidden - NexusMods blocking requests from this IP/User-Agent")
                  if attempt < max_retries - 1:
                      print(f"Retrying in {retry_delay} seconds...")
                      time.sleep(retry_delay)
                      retry_delay *= 1.5  # Exponential backoff
                      
              except Exception as e:
                  print(f"Error on attempt {attempt + 1}: {e}")
                  if attempt < max_retries - 1:
                      print(f"Retrying in {retry_delay} seconds...")
                      time.sleep(retry_delay)
                      retry_delay *= 1.5
          
          if download_count:
              # Store the count in a JSON file
              stats = {
                  'nexusmods_downloads': download_count,
                  'last_updated': __import__('datetime').datetime.utcnow().isoformat(),
                  'mod_url': url,
                  'status': 'success'
              }
              
              os.makedirs('data', exist_ok=True)
              with open('data/nexusmods-stats.json', 'w') as f:
                  json.dump(stats, f, indent=2)
              
              # Also create a shields.io badge endpoint file
              badge_data = {
                  'schemaVersion': 1,
                  'label': 'NexusMods',
                  'message': f'{download_count} downloads',
                  'color': 'informational'
              }
              
              with open('data/nexusmods-stats-badge.json', 'w') as f:
                  json.dump(badge_data, f, indent=2)
              
              print(f"::set-output name=download_count::{download_count}")
              print(f"Successfully fetched download count: {download_count}")
          else:
              print("Warning: Could not fetch download count after retries, will use cached value")
              # Update timestamp even if failed
              if os.path.exists('data/nexusmods-stats.json'):
                  with open('data/nexusmods-stats.json', 'r') as f:
                      stats = json.load(f)
                  stats['last_updated'] = __import__('datetime').datetime.utcnow().isoformat()
                  stats['status'] = 'cached'
                  with open('data/nexusmods-stats.json', 'w') as f:
                      json.dump(stats, f, indent=2)
        
        shell: python
      
      - name: Commit stats if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Check if files changed
          if git diff --quiet data/nexusmods-stats.json data/nexusmods-stats-badge.json 2>/dev/null; then
            echo "No changes to commit"
          else
            git add data/nexusmods-stats.json data/nexusmods-stats-badge.json
            git commit -m "Update NexusMods download stats" || echo "No changes to commit"
            git push || echo "No changes to push"
          fi
        
        continue-on-error: true
